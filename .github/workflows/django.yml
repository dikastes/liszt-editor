name: Django CI

on:
  push:
    branches: [ 'main' ]
  pull_request:
    branches: [ 'main' ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - name: checkout code
      uses: actions/checkout@v4
    - name: set up uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true
        cache-dependency-glob: 'uv.lock'
    - name: set up python
      run: uv python install
    - name: install deps
      run: uv sync
    - name: run test
      run: uv run manage.py test edwoca
