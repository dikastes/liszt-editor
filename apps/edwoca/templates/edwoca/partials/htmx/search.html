{% load i18n %}
<div class="search-container mb-4">
    <label class="label">
        <span class="label-text">{% translate label %}</span>
    </label>
    <div class="relative flex items-center">
        <input
            autocomplete="off"
            type="text"
            name="q"
            class="input input-bordered border-black bg-white flex-1"
            placeholder="{% translate placeholder %}"
            hx-get="{% url 'edwoca:htmx_search' %}"
            hx-trigger="input delay:300ms"
            hx-target="#results-{{ target_id }}"
            hx-indicator="#indicator-{{ target_id }}"
            hx-vals='{
                "app": "{{ app }}",
                "target_app": "{{ target_app|default:"dmad" }}",
                "model_name": "{{ model_name }}",
                "model_id": "{{ id }}",
                "target_model": "{{ target_model }}",
                "target_id": "{{ object.id }}",
                "search_type": "{{ search_type }}",
                "field_name": "{{ field_name }}"
            }'
        >
        <span id="indicator-{{ target_id }}" class="htmx-indicator loading loading-spinner loading-sm absolute right-3"></span>
    </div>
    <div id="results-{{ target_id }}">
        <ul class="p-0 max-h-48 bg-white overflow-auto empty:hidden shadow-lg">
        </ul>
    </div>
</div>
