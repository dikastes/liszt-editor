{% if publisher_list %}
    <ul class="menu p-2 bg-base-100 rounded-box w-full shadow-lg border border-base-300">
        {% for result in publisher_list %}
            <li>
                <button type="button" 
                        class="text-left w-full block p-2 hover:bg-base-200"
                        onclick="selectPublisher('{{ result.object.pk }}', '{{ result.object.name|escapejs }}')">
                    {{ result.object.name }}
                </button>
            </li>
        {% endfor %}
    </ul>
{% else %}
    <div class="p-4 text-sm text-base-content/50 bg-base-100 rounded-box shadow-lg border border-base-300">
        Keine Verlage gefunden.
    </div>
{% endif %}

<script>
function selectPublisher(id, name) {

    const hiddenField = document.getElementById('id_publisher');
    if (hiddenField) hiddenField.value = id;

    const searchField = document.getElementById('id_publisher_search');
    if (searchField) searchField.value = name;

    const resultsContainer = document.getElementById('publisher-results');
    if (resultsContainer) resultsContainer.innerHTML = '';
}
</script>
